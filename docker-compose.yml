version: '3.8'

services:
  db:
    image: postgres:16
    container_name: odoo_db
    restart: always
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - odoo_postgres_data:/var/lib/postgresql/data   # Nom changé ici

  odoo:
    image: odoo:18
    container_name: odoo18_pos
    restart: always
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - ./data:/var/lib/odoo

volumes:
  odoo_postgres_data:  