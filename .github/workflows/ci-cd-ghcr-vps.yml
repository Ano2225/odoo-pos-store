name: CI/CD GHCR + VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/ano2225/odoo-pos-store:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy Docker image on VPS
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-~/odoo-pos-store}"
          ssh -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "mkdir -p $DEPLOY_PATH"
          ssh -o StrictHostKeyChecking=no ${VPS_USER}@${VPS_HOST} "cat > $DEPLOY_PATH/docker-compose.yml <<'EOF'
          version: '3.8'

          services:
            db:
              image: postgres:16
              restart: always
              environment:
                POSTGRES_DB: odoo
                POSTGRES_USER: odoo
                POSTGRES_PASSWORD: odoo
              volumes:
                - odoo_postgres_data:/var/lib/postgresql/data

            odoo:
              image: ghcr.io/ano2225/odoo-pos-store:latest
              restart: always
              depends_on:
                - db
              ports:
                - "8069:8069"
              environment:
                HOST: db
                USER: odoo
                PASSWORD: odoo
                DB_HOST: db
                DB_PORT: 5432
              volumes:
                - ./data:/var/lib/odoo

          volumes:
            odoo_postgres_data:
          EOF"
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "cd $DEPLOY_PATH && docker compose pull && docker compose up -d --remove-orphans"
